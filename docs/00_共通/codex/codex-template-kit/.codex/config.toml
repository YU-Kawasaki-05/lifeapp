# Project-scoped Codex defaults
# Adjust these values to fit your environment and trust model.

model = "gpt-5.4"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[features]
codex_hooks = true

[agents]
max_threads = 4
max_depth = 1

